<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Scripts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; }
        .card { background: #1a1a1a; border: 1px solid #333; }
        .btn-copy { background: #00cc00; color: black; font-weight: bold; }
        .badge { background: #ff4444; }
        h1 { color: #ff3333; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">🔥 Roblox Scripts</h1>
        
        <div class="row" id="scripts"></div>
    </div>

    <script>
        const scripts = [
            {
                title: "Infinite Yield",
                category: "Admin",
                code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()"
            },
            {
                title: "Fly Script",
                category: "Movement",
                code: "loadstring(game:HttpGet('https://pastebin.com/raw/пример'))()"
            }
        ];

        const container = document.getElementById('scripts');
        
        scripts.forEach((s, i) => {
            container.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5>${s.title}</h5>
                            <span class="badge mb-2">${s.category}</span>
                            <button class="btn btn-copy w-100 mt-2" onclick="copy(${i})">📋 Скопировать</button>
                        </div>
                    </div>
                </div>
            `;
        });

        function copy(i) {
            navigator.clipboard.writeText(scripts[i].code);
            alert("✅ Скопировано!");
        }
    </script>
</body>
</html>
