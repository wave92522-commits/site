<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS TEST - Wave SERVER SIDE</title>
    <style>
        body { background: #000; color: #0ff; font-family: Arial; text-align: center; padding: 50px; }
        button { padding: 20px 40px; font-size: 24px; background: #00f0ff; color: #000; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚀  JS TEST PAGE</h1>
    <p>Если ты видишь это и кнопка работает — JavaScript загружается.</p>
    
    <button onclick="testButton()">НАЖМИ МЕНЯ — ДОЛЖЕН ПОЯВИТЬСЯ ALERT</button>

    <script>
        // Этот alert должен появиться сразу при открытии страницы
        alert("✅ JS ЗАГРУЗИЛСЯ УСПЕШНО!\n\nТеперь кнопки будут работать.");

        console.log("%c JS TEST LOADED SUCCESSFULLY", "color:#00f0ff; font-size:20px;");

        function testButton() {
            alert("🎉  Кнопка работает! JS полностью функционален.");
            console.log("Button clicked - JS is working");
        }
    </script>
</body>
</html>
