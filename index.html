<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Scripts • Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
        }
        .sidebar {
            background: #111111;
            border-right: 1px solid #222;
            height: 100vh;
            position: fixed;
            width: 260px;
            padding-top: 20px;
        }
        .main-content {
            margin-left: 260px;
            padding: 30px;
        }
        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #222;
            padding: 15px 30px;
        }
        .nav-link {
            color: #aaa;
            padding: 12px 25px;
            display: block;
        }
        .nav-link:hover, .nav-link.active {
            background: #1f1f1f;
            color: #00ffaa;
        }
        .card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .card:hover {
            border-color: #00ffaa;
            transform: translateY(-4px);
        }
        .btn-copy {
            background: #00cc77;
            color: black;
            font-weight: 600;
            border: none;
        }
        .btn-copy:hover {
            background: #00ff99;
        }
        .badge {
            background: #ff3366;
            font-size: 0.85rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ffaa;
        }
    </style>
</head>
<body>

<!-- Боковая панель -->
<div class="sidebar">
    <div class="px-4 mb-4">
        <span class="logo">Serverside</span>
    </div>
    <a href="#" class="nav-link active"><i class="fas fa-home me-3"></i> Dashboard</a>
    <a href="#" class="nav-link"><i class="fas fa-scroll me-3"></i> Все скрипты</a>
    <a href="#" class="nav-link"><i class="fas fa-gamepad me-3"></i> Для Fluxus</a>
    <a href="#" class="nav-link"><i class="fas fa-gamepad me-3"></i> Для Solara</a>
    <a href="#" class="nav-link"><i class="fas fa-star me-3"></i> Популярное</a>
    <a href="#" class="nav-link"><i class="fas fa-cog me-3"></i> Настройки</a>
</div>

<!-- Верхняя шапка -->
<div class="header">
    <div class="d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Roblox Scripts Dashboard</h4>
        <div>
            <span class="text-muted me-3">wave92522-commits</span>
            <button class="btn btn-sm btn-outline-light">Выйти</button>
        </div>
    </div>
</div>

<!-- Основное содержание -->
<div class="main-content">
    <div class="row" id="scripts-container"></div>
</div>

<script>
    const scripts = [
        {
            title: "Infinite Yield",
            category: "Admin",
            description: "Мощный админ-скрипт с множеством команд",
            code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()"
        },
        {
            title: "Fly Script",
            category: "Movement",
            description: "Простой и стабильный скрипт полёта",
            code: "loadstring(game:HttpGet('https://pastebin.com/raw/examplefly'))()"
        },
        {
            title: "ESP + Aimbot",
            category: "Visual",
            description: "ESP и aimbot в одном скрипте",
            code: "loadstring(game:HttpGet('https://pastebin.com/raw/exampleesp'))()"
        }
        // Добавляй сюда новые скрипты
    ];

    const container = document.getElementById('scripts-container');
    
    scripts.forEach((script, index) => {
21:53
const card = `
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title">${script.title}</h5>
                            <span class="badge">${script.category}</span>
                        </div>
                        <p class="card-text text-muted small">${script.description}</p>
                        <button class="btn btn-copy w-100 mt-3" onclick="copyScript(${index})">
                            <i class="fas fa-copy me-2"></i>Скопировать скрипт
                        </button>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });

    function copyScript(index) {
        navigator.clipboard.writeText(scripts[index].code).then(() => {
            alert('✅ Скрипт скопирован в буфер обмена!');
        });
    }
</script>

</body>
</html>
