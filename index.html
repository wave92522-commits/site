<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave SERVER SIDE SCRIPTS • Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        :root { --neon-cyan: #00f5ff; --neon-turquoise: #00ffc8; --neon-cerulean: #00b8ff; }
        * { transition: all 0.2s ease; }
        body {
            background: linear-gradient(135deg, #0a0a2a, #001122);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        .neon-text { font-family: 'Space Grotesk', sans-serif; text-shadow: 0 0 20px var(--neon-cyan); }
        .neon-card { background: rgba(15,23,42,0.8); border: 2px solid transparent; border-image: linear-gradient(90deg, #00f5ff, #00ffc8) 1; box-shadow: 0 0 30px #00f5ff; }
        .neon-button { background: #0a0a2a; border: 2px solid #00f5ff; color: white; font-weight: 600; }
        .neon-button:hover { transform: scale(1.05); box-shadow: 0 0 30px #00f5ff; }
        .sidebar-link { cursor: pointer; }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <div class="w-64 bg-[#0a0a2a] border-r border-[#00f5ff]/30 flex flex-col h-screen fixed">
        <div class="p-6 border-b border-[#00f5ff]/30 flex items-center gap-3">
            <div class="text-4xl">🌊 </div>
            <h1 class="text-3xl neon-text">WAVE</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <div onclick="navigate('dashboard')" class="sidebar-link flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-[#00f5ff]/10 active">🏠 Dashboard</div>
            <div onclick="navigate('keys')" class="sidebar-link flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-[#00f5ff]/10">🔑  Ключи</div>
            <div onclick="navigate('scripts')" class="sidebar-link flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-[#00f5ff]/10">📜  Скрипты</div>
        </nav>
        <div class="p-4 border-t border-[#00f5ff]/30">
            <div class="flex items-center gap-3 bg-black/40 rounded-2xl p-3">
                <div class="text-2xl">👤 </div>
                <div class="flex-1">wave92522-commits</div>
                <button onclick="logout()" class="px-6 py-2 text-red-400 border border-red-400/50 rounded-2xl hover:bg-red-500/10">Выйти</button>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 ml-64 p-8">
        <h2 id="title" class="text-4xl neon-text mb-8">Dashboard</h2>

        <!-- DASHBOARD -->
        <div id="dashboard" class="content-section active">
            <div class="grid grid-cols-3 gap-6">
                <div class="neon-card rounded-3xl p-6">10ч 47м<br><span class="text-sm text-[#00f5ff]">Оставшееся время</span></div>
                <div class="neon-card rounded-3xl p-6">PREMIUM<br><span class="text-sm text-[#00f5ff]">Тип ключа</span></div>
                <div class="neon-card rounded-3xl p-6">Infinite Yield<br><button onclick="copyScript()" class="neon-button mt-4 w-full py-3 rounded-2xl">КОПИРОВАТЬ</button></div>
            </div>
        </div>

        <!-- КЛЮЧИ -->
        <div id="keys" class="content-section">
            <h3 class="text-2xl mb-4">СИСТЕМА КЛЮЧЕЙ</h3>
            <div class="grid grid-cols-2 gap-6">
                <div class="neon-card rounded-3xl p-8">
                    WAVE KEY — 5 часов
                    <button onclick="generateKey('wave')" class="neon-button mt-6 w-full py-5 rounded-3xl text-xl">СГЕНЕРИРОВАТЬ</button>
                </div>
                <div class="neon-card rounded-3xl p-8">
23:16
PREMIUM KEY — 10 часов
                    <button onclick="generateKey('premium')" class="neon-button mt-6 w-full py-5 rounded-3xl text-xl">СГЕНЕРИРОВАТЬ</button>
                </div>
            </div>
        </div>

        <!-- СКРИПТЫ -->
        <div id="scripts" class="content-section">
            <h3 class="text-2xl mb-4">Скрипты</h3>
            <div class="grid grid-cols-3 gap-6">
                <div class="neon-card rounded-3xl p-6 text-center">Infinite Yield<br><button onclick="useScript()" class="neon-button mt-6 w-full py-4">ЗАПУСТИТЬ</button></div>
                <div class="neon-card rounded-3xl p-6 text-center">Wave Hub<br><button onclick="useScript()" class="neon-button mt-6 w-full py-4">ЗАПУСТИТЬ</button></div>
                <div class="neon-card rounded-3xl p-6 text-center border-2 border-dashed border-[#00f5ff]">TEST<br><button onclick="runTest()" class="neon-button mt-6 w-full py-4 bg-gradient-to-r from-[#00f5ff] to-[#00ffc8] text-black">🧪  ЗАПУСТИТЬ ТЕСТ</button></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="neon-card rounded-3xl p-10 max-w-md w-full mx-4 text-center">
            <h3 class="text-2xl neon-text mb-6">КЛЮЧ СГЕНЕРИРОВАН!</h3>
            <div id="key-text" class="font-mono text-3xl bg-black/50 p-6 rounded-2xl mb-8 break-all"></div>
            <button onclick="copyKey()" class="neon-button w-full py-5 rounded-3xl text-xl">СКОПИРОВАТЬ КЛЮЧ</button>
            <button onclick="closeModal()" class="mt-4 text-[#00f5ff]">Закрыть</button>
        </div>
    </div>

    <script>
        console.log('%c🌊  WAVE DASHBOARD ЗАГРУЖЕН — КНОПКИ ДОЛЖНЫ РАБОТАТЬ', 'color:#00f5ff; font-size:20px; font-weight:bold');

        function navigate(page) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            document.getElementById('title').textContent = page === 'dashboard' ? 'Dashboard' : page === 'keys' ? 'Ключи' : 'Скрипты';
        }

        function generateKey(type) {
            const modal = document.getElementById('modal');
            const text = document.getElementById('key-text');
            let key = 'WAVE-' + Math.random().toString(36).substring(2, 10).toUpperCase();
            text.textContent = key;
            modal.classList.remove('hidden');
            modal.style.display = 'flex';
        }

        function copyKey() {
            const key = document.getElementById('key-text').textContent;
            navigator.clipboard.writeText(key).then(() => {
                alert('✅ Ключ скопирован!');
                closeModal();
            });
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
            modal.classList.add('hidden');
        }

        function copyScript() { alert('✅ Infinite Yield скопирован!'); }
        function useScript() { alert('🚀  Скрипт запущен в Executor!'); }
        function runTest() {
            alert('✅ ТЕСТ ПРОЙДЕН УСПЕШНО!');
        }
        function logout() {
            if (confirm('Выйти?')) location.reload();
        }
    </script>
</body>
</html>
