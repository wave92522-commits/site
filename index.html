<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --neon-cyan: #00f5ff;
            --neon-turquoise: #00ffc8;
            --neon-cornflower: #7cc6ff;
            --neon-cerulean: #00b8ff;
            --neon-azure: #00d4ff;
            --neon-bright: #00ffff;
        }

        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, transform, box-shadow;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 200ms;
        }

        body {
            background: radial-gradient(circle at 50% 30%, rgba(0, 245, 255, 0.15) 0%, transparent 70%),
                        linear-gradient(135deg, #0a0a2a 0%, #001122 100%);
            background-size: 300% 300%;
            animation: gradientShift 30s ease infinite;
            font-family: 'Inter', system_ui, sans-serif;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Супер-гладкий неон */
        .neon-text {
            font-family: 'Space Grotesk', sans-serif;
            text-shadow: 
                0 0 15px var(--neon-cyan),
                0 0 30px var(--neon-cyan),
                0 0 50px var(--neon-turquoise),
                0 0 80px var(--neon-cerulean),
                0 0 120px var(--neon-bright);
            animation: neonFlicker 2.5s infinite alternate ease-in-out;
        }

        @keyframes neonFlicker {
            0%, 100% { text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-cyan), 0 0 50px var(--neon-turquoise), 0 0 80px var(--neon-cerulean); }
            50% { text-shadow: 0 0 20px var(--neon-turquoise), 0 0 40px var(--neon-turquoise), 0 0 70px var(--neon-azure), 0 0 110px var(--neon-bright); }
        }

        /* Glassmorphism + Neon Card */
        .neon-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid transparent;
            border-image: linear-gradient(90deg, var(--neon-cyan), var(--neon-turquoise), var(--neon-cornflower), var(--neon-cerulean)) 1;
            box-shadow: 
                0 0 25px -5px var(--neon-cyan),
                0 0 40px -10px var(--neon-turquoise),
                0 25px 50px -12px rgb(0 0 0 / 0.4);
            animation: neonPulse 6s ease-in-out infinite;
        }

        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 25px -5px var(--neon-cyan), 0 0 40px -10px var(--neon-turquoise), 0 25px 50px -12px rgb(0 0 0 / 0.4); }
            50% { box-shadow: 0 0 35px 5px var(--neon-turquoise), 0 0 60px -5px var(--neon-azure), 0 30px 60px -15px rgb(0 0 0 / 0.5); }
        }

        /* Кнопки с супер-шimmer */
        .neon-button {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #0a0a2a, #001122);
            border: 2px solid var(--neon-cyan);
            color: white;
            font-weight: 600;
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        .neon-button:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 0 40px var(--neon-bright);
        }
        .neon-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
23:02
width: 40%;
            height: 300%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-25deg);
            animation: shimmer 3.5s linear infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(300%); } }

        /* Сайдбар */
        .sidebar-link {
            position: relative;
            cursor: pointer;
        }
        .sidebar-link.active {
            background: rgba(0, 245, 255, 0.15);
            color: var(--neon-bright);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        .sidebar-link:hover::after,
        .sidebar-link.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -1px;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-turquoise));
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        /* Плавные переходы секций */
        .content-section {
            animation: sectionFade 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes sectionFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Модалка */
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Дополнительный фон-сетка */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -1;
            animation: gridMove 40s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 60px 60px; } }
    </style>
</head>
