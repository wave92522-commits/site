<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave SERVER SIDE SCRIPTS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap');
        
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f0ff, #00bfff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: neonShift 3s linear infinite;
            text-shadow: 0 0 20px #00f0ff, 0 0 40px #00bfff, 0 0 60px #8a2be2;
        }
        @keyframes neonShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .key-box {
            background: #111;
            border: 3px solid transparent;
            border-image: linear-gradient(90deg, #00f0ff, #00bfff, #8a2be2) 1;
            border-radius: 12px;
            padding: 25px;
            margin: 25px 0;
            text-align: center;
            box-shadow: 0 0 25px #00f0ff;
            min-height: 100px;
        }
        .key-text {
            font-size: 1.5rem;
            font-weight: bold;
            word-break: break-all;
            margin: 15px 0;
            color: #00f0ff;
            text-shadow: 0 0 15px #00bfff;
        }
        button {
            background: linear-gradient(90deg, #00bfff, #00f0ff, #8a2be2);
            color: #000;
            border: none;
            padding: 16px 28px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin: 8px;
            box-shadow: 0 0 20px #00f0ff;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px #8a2be2;
            filter: brightness(1.2);
        }
        .section {
            background: #111;
            padding: 22px;
            margin: 25px 0;
            border-radius: 12px;
            border: 2px solid #222;
        }
        .admin {
            background: #1a0033;
            border: 3px solid #8a2be2;
            padding: 25px;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0 0 25px #8a2be2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wave SERVER SIDE SCRIPTS</h1>
        <p style="text-align:center; color:#aaa; margin-bottom:30px;">Добро пожаловать, wave92522-commits!</p>

        <div class="key-box" id="key-display">
            <p style="color:#666;">Нажми кнопку, чтобы получить ключ</p>
        </div>

        <div style="text-align:center; margin:25px 0;">
            <button onclick="getFreeKey()">БЕСПЛАТНЫЙ КЛЮЧ (5 часов)</button>
            <button onclick="getPremiumKey()">ПРЕМИУМ КЛЮЧ (15 часов)</button>
        </div>

        <div class="section">
            <h2 style="color:#00f0ff; margin-bottom:15px;">📊  Твой аккаунт</h2>
            <p>Имя: <strong>wave92522-commits</strong></p>
            <p>Статус ключа: <span style="color:#00f0ff; font-weight:bold;">АКТИВЕН</span></p>
            <p>Осталось времени: <span id="time-left">4ч 32м</span></p>
        </div>

        <div class="section">
            <h2 style="color:#00f0ff; margin-bottom:15px;">📜  Скрипты</h2>
            <button onclick="copyScript('Infinite Yield')">Скопировать Infinite Yield</button>
        </div>

        <!-- ADMIN PANEL (только для тебя) -->
22:26
<div id="admin-panel" class="admin" style="display:none;">
            <h2 style="color:#8a2be2;">🔧  ADMIN PANEL</h2>
            <button onclick="copyPremiumKey()">Копировать PREMIUM ключ</button>
            <button onclick="copyFreeKey()">Копировать FREE ключ</button>
            <button onclick="lockSite()" style="background:linear-gradient(#8a2be2,#00bfff); color:white;">Закрыть сайт для всех</button>
        </div>
    </div>

    <script>
        let currentKey = "";

        function showKey(key, type) {
            currentKey = key;
            const display = document.getElementById("key-display");
            display.innerHTML = `
                <p style="color:#00f0ff; margin-bottom:10px; font-size:1.3rem;">✅ ${type} КЛЮЧ ПОЛУЧЕН!</p>
                <div class="key-text">${key}</div>
                <button onclick="copyCurrentKey()" style="padding:12px 24px; font-size:1rem;">📋 Скопировать ключ</button>
            `;
            copyCurrentKey(); // авто-копирование
        }

        function copyCurrentKey() {
            if (currentKey) {
                navigator.clipboard.writeText(currentKey);
            }
        }

        function getFreeKey() {
            const key = "FREE-" + Math.random().toString(36).substring(2, 14).toUpperCase();
            showKey(key, "БЕСПЛАТНЫЙ");
        }

        function getPremiumKey() {
            const key = "PREM-" + Math.random().toString(36).substring(2, 14).toUpperCase();
            showKey(key, "ПРЕМИУМ");
        }

        function copyScript(name) {
            const text = `-- ${name} успешно загружен`;
            navigator.clipboard.writeText(text);
            alert("✅ " + name + " скопирован в буфер!");
        }

        function copyPremiumKey() {
            navigator.clipboard.writeText("PREMIUM-KEY-WAVE-SIDE-2026");
            alert("✅ PREMIUM ключ скопирован!");
        }

        function copyFreeKey() {
            navigator.clipboard.writeText("FREE-KEY-WAVE-SIDE-2026");
            alert("✅ FREE ключ скопирован!");
        }

        function lockSite() {
            if (confirm("Закрыть сайт для всех пользователей?")) {
                alert("✅ Сайт закрыт (видно только тебе).");
            }
        }

        // Показываем Admin Panel только тебе
        window.onload = () => {
            if (window.location.hostname.includes("wave92522-commits")) {
                document.getElementById("admin-panel").style.display = "block";
            }
        };
    </script>
</body>
</html>
